<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Chromium Compositor Repro</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f1f5f9;
    color: #0f172a;
  }

  .app-header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 64px;
    background: #1e293b;
    color: #ffffff;
    display: flex;
    align-items: center;
    padding: 0 16px;
    font-size: 18px;
    font-weight: 700;
    z-index: 100;
  }

  main {
    padding-top: 64px;
  }

  section {
    max-width: 1120px;
    margin: 0 auto;
    padding: 24px 16px;
  }

  .section-title {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 16px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }

  @media (min-width: 1024px) {
    .grid {
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }
  }

  .box {
    width: 100%;
    height: 220px;
    background-color: #334155;
    color: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 600;
  }

  .hud {
    position: fixed;
    top: 72px;
    right: 8px;
    background: #000000;
    color: #00ff88;
    font-family: monospace;
    font-size: 12px;
    line-height: 1.4;
    padding: 8px 10px;
    z-index: 200;
  }

  .controls {
    position: fixed;
    bottom: 16px;
    right: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 200;
  }

  .controls button {
    background: #f97316;
    color: #ffffff;
    border: none;
    padding: 12px 16px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }
</style>
</head>
<body>
  <header class="app-header">Chromium Compositor Repro</header>

  <div class="hud" id="hud">loading…</div>

  <main>
    <section>
      <div class="section-title">Trending</div>
      <div class="grid">
        <div class="box" style="background-color:#334155">Box 1</div>
        <div class="box" style="background-color:#475569">Box 2</div>
        <div class="box" style="background-color:#334155">Box 3</div>
        <div class="box" style="background-color:#475569">Box 4</div>
        <div class="box" style="background-color:#334155">Box 5</div>
        <div class="box" style="background-color:#475569">Box 6</div>
        <div class="box" style="background-color:#334155">Box 7</div>
        <div class="box" style="background-color:#475569">Box 8</div>
      </div>
    </section>

    <section>
      <div class="section-title">Best Sellers</div>
      <div class="grid">
        <div class="box" style="background-color:#7f1d1d">Box 1</div>
        <div class="box" style="background-color:#991b1b">Box 2</div>
        <div class="box" style="background-color:#7f1d1d">Box 3</div>
        <div class="box" style="background-color:#991b1b">Box 4</div>
        <div class="box" style="background-color:#7f1d1d">Box 5</div>
        <div class="box" style="background-color:#991b1b">Box 6</div>
        <div class="box" style="background-color:#7f1d1d">Box 7</div>
        <div class="box" style="background-color:#991b1b">Box 8</div>
      </div>
    </section>

    <section>
      <div class="section-title">New Arrivals</div>
      <div class="grid">
        <div class="box" style="background-color:#14532d">Box 1</div>
        <div class="box" style="background-color:#166534">Box 2</div>
        <div class="box" style="background-color:#14532d">Box 3</div>
        <div class="box" style="background-color:#166534">Box 4</div>
        <div class="box" style="background-color:#14532d">Box 5</div>
        <div class="box" style="background-color:#166534">Box 6</div>
        <div class="box" style="background-color:#14532d">Box 7</div>
        <div class="box" style="background-color:#166534">Box 8</div>
      </div>
    </section>
  </main>

  <div class="controls">
    <button onclick="window.scrollTo(0, document.body.scrollHeight)">Scroll to Bottom</button>
    <button onclick="window.scrollTo(0, 0)">Scroll to Top</button>
  </div>

  <script>
    function updateHud() {
      document.getElementById('hud').innerHTML =
        'vw: ' + window.innerWidth + '<br>' +
        'vh: ' + window.innerHeight + '<br>' +
        'dpr: ' + window.devicePixelRatio + '<br>' +
        'scrollY: ' + Math.round(window.scrollY);
    }
    updateHud();
    window.addEventListener('scroll', updateHud);
    window.addEventListener('resize', updateHud);
  </script>
</body>
</html>
